<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>共有メモ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8; --surface: #f3f2ef;
      --border: rgba(0,0,0,0.10); --border-md: rgba(0,0,0,0.18);
      --text: #1a1a18; --text-2: #6b6a65; --text-3: #aaa99f;
      --accent: #1D9E75; --accent-light: #e1f5ee;
      --danger: #A32D2D; --danger-light: #FCEBEB;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18181a; --surface: #222224;
        --border: rgba(255,255,255,0.09); --border-md: rgba(255,255,255,0.16);
        --text: #f0ede8; --text-2: #9e9c97; --text-3: #5e5d59;
        --accent-light: #04342C; --danger-light: #501313;
      }
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; }
    body { display: flex; flex-direction: column; }

    header { padding: 0 20px; height: 52px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg); flex-shrink: 0; }
    .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    .user-row { display: flex; align-items: center; gap: 8px; }
    .user-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    #username-input { border: 0.5px solid var(--border-md); border-radius: var(--radius); padding: 5px 10px; font-size: 13px; background: var(--surface); color: var(--text); width: 130px; }
    #username-input:focus { outline: none; border-color: var(--accent); }

    #main { display: flex; flex: 1; overflow: hidden; }

    #sidebar { width: 240px; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; background: var(--surface); flex-shrink: 0; }
    #search-wrap { padding: 12px 14px; border-bottom: 0.5px solid var(--border); }
    #search { width: 100%; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 7px 10px; font-size: 13px; background: var(--bg); color: var(--text); }
    #search:focus { outline: none; border-color: var(--accent); }
    #search::placeholder { color: var(--text-3); }
    #new-btn { margin: 10px 14px 6px; width: calc(100% - 28px); background: none; border: 0.5px solid var(--border-md); border-radius: var(--radius); padding: 7px 10px; font-size: 13px; cursor: pointer; color: var(--text); text-align: left; transition: background 0.15s; }
    #new-btn:hover { background: var(--bg); }
    #note-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .note-item { padding: 10px 14px; cursor: pointer; border-radius: 7px; margin: 2px 6px; transition: background 0.12s; }
    .note-item:hover { background: var(--bg); }
    .note-item.active { background: var(--bg); border: 0.5px solid var(--border); }
    .note-title-li { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-meta { font-size: 10px; color: var(--text-3); margin-top: 3px; display: flex; justify-content: space-between; }

    #editor { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
    #editor-top { padding: 14px 20px 12px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
    #title-input { border: none; outline: none; font-size: 17px; font-weight: 600; color: var(--text); background: transparent; flex: 1; min-width: 0; }
    #title-input::placeholder { color: var(--text-3); font-weight: 400; }
    #delete-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--text-3); padding: 5px 10px; border-radius: var(--radius); transition: background 0.12s, color 0.12s; }
    #delete-btn:hover { color: var(--danger); background: var(--danger-light); }

    #body-wrap { flex: 1; display: flex; flex-direction: column; padding: 16px 20px; gap: 12px; }
    #body-input { flex: 1; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; font-size: 15px; line-height: 1.8; color: var(--text); background: var(--surface); font-family: inherit; resize: none; min-height: 160px; transition: border-color 0.15s; }
    #body-input:focus { outline: none; border-color: var(--accent); }
    #body-input::placeholder { color: var(--text-3); }

    #submit-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 12px 24px; font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; align-self: flex-end; min-width: 100px; }
    #submit-btn:hover { opacity: 0.85; }

    #status-bar { padding: 7px 20px; border-top: 0.5px solid var(--border); font-size: 11px; color: var(--text-3); display: flex; justify-content: space-between; }
    .sync-ok { color: var(--accent); }
    .sync-ing { color: #BA7517; }
    .sync-err { color: var(--danger); }
    .empty-list { padding: 14px; font-size: 12px; color: var(--text-3); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">共有<span>メモ</span></div>
  <div class="user-row">
    <div class="user-dot"></div>
    <input id="username-input" type="text" placeholder="名前を入力..." maxlength="12" />
  </div>
</header>

<div id="main">
  <div id="sidebar">
    <div id="search-wrap">
      <input id="search" type="text" placeholder="メモを検索..." oninput="filterNotes(this.value)" />
    </div>
    <button id="new-btn" onclick="newNote()">＋ 新しいメモ</button>
    <div id="note-list"><div class="empty-list">接続中...</div></div>
  </div>
  <div id="editor">
    <div id="editor-top">
      <input id="title-input" type="text" placeholder="タイトル" />
      <button id="delete-btn" onclick="deleteNote()">削除</button>
    </div>
    <div id="body-wrap">
      <textarea id="body-input" placeholder="ここにメモを書いてください..."></textarea>
      <button id="submit-btn" onclick="submitNote()">登録</button>
    </div>
    <div id="status-bar">
      <span id="char-count"></span>
      <span id="sync-indicator" class="sync-ok"></span>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    databaseURL: "https://shared-memo-65d9d-default-rtdb.asia-southeast1.firebasedatabase.app"
  });
  const db = firebase.database();
  const notesRef = db.ref('notes');

  let notes = [];
  let currentId = null;
  let username = 'ゲスト';
  let query = '';

  document.getElementById('username-input').addEventListener('input', e => {
    username = e.target.value.trim() || 'ゲスト';
  });
  document.getElementById('body-input').addEventListener('input', e => {
    document.getElementById('char-count').textContent = e.target.value.length + ' 文字';
  });

  function nowStr() {
    return new Date().toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function setSync(state, text) {
    const el = document.getElementById('sync-indicator');
    el.className = 'sync-' + state;
    el.textContent = text;
  }

  function renderList() {
    const list = document.getElementById('note-list');
    const filtered = notes.filter(n => (n.title||'').includes(query) || (n.body||'').includes(query));
    if (filtered.length === 0) { list.innerHTML = '<div class="empty-list">メモがありません</div>'; return; }
    list.innerHTML = filtered.map(n => `
      <div class="note-item ${n.id === currentId ? 'active' : ''}" onclick="selectNote('${n.id}')">
        <div class="note-title-li">${escHtml(n.title)||'無題'}</div>
        <div class="note-meta"><span>${escHtml(n.lastEditor)||''}</span><span>${n.dateStr||''}</span></div>
      </div>
    `).join('');
  }

  function loadEditor(note) {
    document.getElementById('title-input').value = note ? note.title||'' : '';
    document.getElementById('body-input').value = note ? note.body||'' : '';
    document.getElementById('char-count').textContent = note ? (note.body||'').length+' 文字' : '';
  }

  function selectNote(id) {
    currentId = id;
    renderList();
    loadEditor(notes.find(n => n.id === id)||null);
  }

  function newNote() {
    currentId = null;
    loadEditor(null);
    document.getElementById('title-input').focus();
    renderList();
  }

  function submitNote() {
    const title = document.getElementById('title-input').value.trim();
    const body = document.getElementById('body-input').value.trim();
    if (!title && !body) { setSync('err', 'タイトルか内容を入力してください'); return; }
    setSync('ing', '保存中...');
    const id = currentId || notesRef.push().key;
    currentId = id;
    notesRef.child(id).set({ id, title, body, lastEditor: username, dateStr: nowStr(), updated: Date.now() })
      .then(() => setSync('ok', '登録しました！'))
      .catch(() => setSync('err', '保存失敗'));
  }

  function deleteNote() {
    if (!currentId) return;
    if (!confirm('このメモを削除しますか？')) return;
    notesRef.child(currentId).remove().then(() => {
      currentId = null;
      loadEditor(null);
      setSync('ok', '削除しました');
    });
  }

  function filterNotes(v) { query = v; renderList(); }

  notesRef.on('value', snapshot => {
    const data = snapshot.val() || {};
    notes = Object.values(data).sort((a, b) => b.updated - a.updated);
    renderList();
    setSync('ok', 'リアルタイム同期中');
  });
</script>
</body>
</html>
