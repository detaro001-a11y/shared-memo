<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>共有メモ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8; --surface: #f3f2ef;
      --border: rgba(0,0,0,0.10); --border-md: rgba(0,0,0,0.18);
      --text: #1a1a18; --text-2: #6b6a65; --text-3: #aaa99f;
      --accent: #1D9E75; --danger: #A32D2D; --danger-light: #FCEBEB;
      --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18181a; --surface: #222224;
        --border: rgba(255,255,255,0.09); --border-md: rgba(255,255,255,0.16);
        --text: #f0ede8; --text-2: #9e9c97; --text-3: #5e5d59;
        --danger-light: #501313;
      }
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; }
    body { display: flex; flex-direction: column; }

    header { padding: 0 16px; height: 52px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg); flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    #menu-btn { background: none; border: 0.5px solid var(--border-md); border-radius: var(--radius); padding: 5px 10px; font-size: 13px; cursor: pointer; color: var(--text); display: none; }
    .user-row { display: flex; align-items: center; gap: 8px; }
    .user-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    #username-input { border: 0.5px solid var(--border-md); border-radius: var(--radius); padding: 5px 10px; font-size: 13px; background: var(--surface); color: var(--text); width: 120px; }
    #username-input:focus { outline: none; border-color: var(--accent); }

    #main { display: flex; flex: 1; overflow: hidden; }

    /* サイドバー */
    #sidebar { width: 240px; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; background: var(--surface); flex-shrink: 0; transition: transform 0.25s ease; }
    #search-wrap { padding: 12px 14px; border-bottom: 0.5px solid var(--border); }
    #search { width: 100%; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 7px 10px; font-size: 13px; background: var(--bg); color: var(--text); }
    #search:focus { outline: none; border-color: var(--accent); }
    #search::placeholder { color: var(--text-3); }
    #new-btn { margin: 10px 14px 6px; width: calc(100% - 28px); background: none; border: 0.5px solid var(--border-md); border-radius: var(--radius); padding: 7px 10px; font-size: 13px; cursor: pointer; color: var(--text); text-align: left; }
    #new-btn:hover { background: var(--bg); }
    #note-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .note-item { padding: 10px 14px; cursor: pointer; border-radius: 7px; margin: 2px 6px; }
    .note-item:hover { background: var(--bg); }
    .note-item.active { background: var(--bg); border: 0.5px solid var(--border); }
    .note-title-li { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-meta { font-size: 10px; color: var(--text-3); margin-top: 3px; display: flex; justify-content: space-between; }
    .note-thumb { display: flex; gap: 4px; margin-top: 4px; }
    .note-thumb img { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; border: 0.5px solid var(--border); }

    /* エディタ共通 */
    #editor { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); overflow: hidden; }

    /* ── 閲覧モード ── */
    #view-mode { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #view-top { padding: 12px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    #view-title { font-size: 17px; font-weight: 600; color: var(--text); flex: 1; }
    .view-actions { display: flex; gap: 8px; }
    #edit-btn { background: none; border: 0.5px solid var(--accent); border-radius: var(--radius); padding: 6px 14px; font-size: 13px; color: var(--accent); cursor: pointer; font-weight: 500; }
    #edit-btn:hover { background: var(--accent); color: #fff; }
    #view-delete-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--text-3); padding: 6px 10px; border-radius: var(--radius); }
    #view-delete-btn:hover { color: var(--danger); background: var(--danger-light); }
    #view-body-wrap { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    #view-body { font-size: 15px; line-height: 1.9; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    #view-images { display: flex; flex-wrap: wrap; gap: 8px; }
    #view-images img { width: 100px; height: 100px; object-fit: cover; border-radius: var(--radius); border: 0.5px solid var(--border); cursor: pointer; }
    #view-footer { padding: 6px 16px; border-top: 0.5px solid var(--border); font-size: 11px; color: var(--text-3); display: flex; justify-content: space-between; }

    /* ── 編集モード ── */
    #edit-mode { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #edit-top { padding: 12px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
    #title-input { border: none; outline: none; font-size: 17px; font-weight: 600; color: var(--text); background: transparent; flex: 1; min-width: 0; }
    #title-input::placeholder { color: var(--text-3); font-weight: 400; }
    #cancel-btn { background: none; border: 0.5px solid var(--border-md); border-radius: var(--radius); padding: 5px 12px; font-size: 13px; color: var(--text-2); cursor: pointer; }
    #cancel-btn:hover { background: var(--surface); }
    #body-wrap { flex: 1; display: flex; flex-direction: column; padding: 14px 16px; gap: 10px; overflow-y: auto; }
    #body-input { flex: 1; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; font-size: 15px; line-height: 1.8; color: var(--text); background: var(--surface); font-family: inherit; resize: none; min-height: 120px; transition: border-color 0.15s; }
    #body-input:focus { outline: none; border-color: var(--accent); }
    #body-input::placeholder { color: var(--text-3); }

    /* 画像エリア */
    #image-label { display: flex; align-items: center; justify-content: center; gap: 8px; border: 1.5px dashed var(--border-md); border-radius: var(--radius); padding: 12px; cursor: pointer; font-size: 13px; color: var(--text-3); transition: border-color 0.15s, color 0.15s; }
    #image-label:hover { border-color: var(--accent); color: var(--accent); }
    #image-input { display: none; }
    #image-previews { display: flex; flex-wrap: wrap; gap: 8px; }
    .preview-wrap { position: relative; width: 80px; height: 80px; }
    .preview-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); border: 0.5px solid var(--border); cursor: pointer; }
    .preview-wrap button { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--danger); color: #fff; border: none; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    #size-warn { font-size: 11px; color: var(--danger); }

    #submit-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 13px; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; }
    #submit-btn:active { opacity: 0.8; }
    #submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #status-bar { padding: 6px 16px; border-top: 0.5px solid var(--border); font-size: 11px; color: var(--text-3); display: flex; justify-content: space-between; flex-shrink: 0; }
    .sync-ok { color: var(--accent); }
    .sync-ing { color: #BA7517; }
    .sync-err { color: var(--danger); }

    /* 空状態 */
    #empty-editor { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-3); font-size: 13px; }
    .empty-list { padding: 14px; font-size: 12px; color: var(--text-3); }

    /* モーダル */
    #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    #modal.show { display: flex; }
    #modal img { max-width: 90vw; max-height: 90vh; border-radius: var(--radius); }
    #modal-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 20px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }

    @media (max-width: 600px) {
      #menu-btn { display: block; }
      #sidebar { position: fixed; top: 52px; left: 0; bottom: 0; z-index: 20; width: 80vw; max-width: 300px; transform: translateX(-100%); box-shadow: 2px 0 12px rgba(0,0,0,0.12); }
      #sidebar.open { transform: translateX(0); }
      #overlay { display: none; position: fixed; inset: 52px 0 0 0; background: rgba(0,0,0,0.3); z-index: 15; }
      #overlay.show { display: block; }
      #username-input { width: 90px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <button id="menu-btn" onclick="toggleSidebar()">☰ 一覧</button>
    <div class="logo">共有<span>メモ</span></div>
  </div>
  <div class="user-row">
    <div class="user-dot"></div>
    <input id="username-input" type="text" placeholder="名前..." maxlength="12" />
  </div>
</header>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="main">
  <div id="sidebar">
    <div id="search-wrap">
      <input id="search" type="text" placeholder="メモを検索..." oninput="filterNotes(this.value)" />
    </div>
    <button id="new-btn" onclick="newNote()">＋ 新しいメモ</button>
    <div id="note-list"><div class="empty-list">接続中...</div></div>
  </div>

  <div id="editor">

    <!-- 空状態 -->
    <div id="empty-editor">メモを選択するか、新規作成してください</div>

    <!-- 閲覧モード -->
    <div id="view-mode" style="display:none;">
      <div id="view-top">
        <div id="view-title"></div>
        <div class="view-actions">
          <button id="edit-btn" onclick="enterEditMode()">編集</button>
          <button id="view-delete-btn" onclick="deleteNote()">削除</button>
        </div>
      </div>
      <div id="view-body-wrap">
        <div id="view-body"></div>
        <div id="view-images"></div>
      </div>
      <div id="view-footer">
        <span id="view-editor"></span>
        <span id="view-date"></span>
      </div>
    </div>

    <!-- 編集モード -->
    <div id="edit-mode" style="display:none;">
      <div id="edit-top">
        <input id="title-input" type="text" placeholder="タイトル" />
        <button id="cancel-btn" onclick="cancelEdit()">キャンセル</button>
      </div>
      <div id="body-wrap">
        <textarea id="body-input" placeholder="ここにメモを書いてください..."></textarea>
        <div>
          <label id="image-label" for="image-input">📷 画像を追加（最大3枚）</label>
          <input id="image-input" type="file" accept="image/*" multiple onchange="handleImages(this)" />
          <div id="image-previews"></div>
          <div id="size-warn"></div>
        </div>
        <button id="submit-btn" onclick="submitNote()">登録</button>
      </div>
      <div id="status-bar">
        <span id="char-count"></span>
        <span id="sync-indicator" class="sync-ok"></span>
      </div>
    </div>

  </div>
</div>

<div id="modal" onclick="closeModal()">
  <button id="modal-close" onclick="closeModal()">✕</button>
  <img id="modal-img" src="" alt="" />
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    databaseURL: "https://shared-memo-65d9d-default-rtdb.asia-southeast1.firebasedatabase.app"
  });
  const db = firebase.database();
  const notesRef = db.ref('notes');

  let notes = [], currentId = null, username = 'ゲスト', query = '';
  let pendingImages = [];
  const MAX_IMAGES = 3, MAX_SIZE = 800;

  document.getElementById('username-input').addEventListener('input', e => {
    username = e.target.value.trim() || 'ゲスト';
  });
  document.getElementById('body-input').addEventListener('input', e => {
    document.getElementById('char-count').textContent = e.target.value.length + ' 文字';
  });

  // ── モード切替 ─────────────────────────────────────────────────────────
  function showEmpty() {
    document.getElementById('empty-editor').style.display = 'flex';
    document.getElementById('view-mode').style.display = 'none';
    document.getElementById('edit-mode').style.display = 'none';
  }
  function showView(note) {
    document.getElementById('empty-editor').style.display = 'none';
    document.getElementById('view-mode').style.display = 'flex';
    document.getElementById('edit-mode').style.display = 'none';
    document.getElementById('view-title').textContent = note.title || '無題';
    document.getElementById('view-body').textContent = note.body || '';
    document.getElementById('view-editor').textContent = note.lastEditor || '';
    document.getElementById('view-date').textContent = note.dateStr || '';
    const imgWrap = document.getElementById('view-images');
    imgWrap.innerHTML = note.images ? note.images.map(src => `<img src="${src}" onclick="openModal('${src}')" />`).join('') : '';
  }
  function showEdit() {
    document.getElementById('empty-editor').style.display = 'none';
    document.getElementById('view-mode').style.display = 'none';
    document.getElementById('edit-mode').style.display = 'flex';
  }

  function enterEditMode() {
    const note = notes.find(n => n.id === currentId);
    if (!note) return;
    document.getElementById('title-input').value = note.title || '';
    document.getElementById('body-input').value = note.body || '';
    document.getElementById('char-count').textContent = (note.body || '').length + ' 文字';
    pendingImages = note.images ? note.images.map(d => ({ dataUrl: d })) : [];
    renderPreviews();
    showEdit();
    document.getElementById('body-input').focus();
  }

  function cancelEdit() {
    if (currentId) {
      const note = notes.find(n => n.id === currentId);
      if (note) { showView(note); return; }
    }
    showEmpty();
    currentId = null;
    renderList();
  }

  // ── サイドバー ─────────────────────────────────────────────────────────
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  // ── 画像処理 ──────────────────────────────────────────────────────────
  function handleImages(input) {
    const files = Array.from(input.files);
    const remaining = MAX_IMAGES - pendingImages.length;
    if (remaining <= 0) { document.getElementById('size-warn').textContent = '画像は最大3枚です'; return; }
    files.slice(0, remaining).forEach(file => {
      resizeImage(file, MAX_SIZE).then(dataUrl => {
        pendingImages.push({ dataUrl });
        renderPreviews();
      });
    });
    input.value = '';
  }
  function resizeImage(file, maxPx) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = url;
    });
  }
  function renderPreviews() {
    document.getElementById('image-previews').innerHTML = pendingImages.map((img, i) => `
      <div class="preview-wrap">
        <img src="${img.dataUrl}" onclick="openModal('${img.dataUrl}')" />
        <button onclick="removeImage(${i})">✕</button>
      </div>
    `).join('');
    document.getElementById('size-warn').textContent = pendingImages.length >= MAX_IMAGES ? '画像は最大3枚です' : '';
  }
  function removeImage(i) { pendingImages.splice(i, 1); renderPreviews(); }

  // ── モーダル ──────────────────────────────────────────────────────────
  function openModal(src) {
    document.getElementById('modal-img').src = src;
    document.getElementById('modal').classList.add('show');
  }
  function closeModal() { document.getElementById('modal').classList.remove('show'); }

  // ── ユーティリティ ─────────────────────────────────────────────────────
  function nowStr() {
    return new Date().toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function setSync(state, text) {
    const el = document.getElementById('sync-indicator');
    el.className = 'sync-' + state;
    el.textContent = text;
  }

  // ── レンダリング ───────────────────────────────────────────────────────
  function renderList() {
    const list = document.getElementById('note-list');
    const filtered = notes.filter(n => (n.title||'').includes(query) || (n.body||'').includes(query));
    if (filtered.length === 0) { list.innerHTML = '<div class="empty-list">メモがありません</div>'; return; }
    list.innerHTML = filtered.map(n => `
      <div class="note-item ${n.id === currentId ? 'active' : ''}" onclick="selectNote('${n.id}')">
        <div class="note-title-li">${escHtml(n.title)||'無題'}</div>
        <div class="note-meta"><span>${escHtml(n.lastEditor)||''}</span><span>${n.dateStr||''}</span></div>
        ${n.images && n.images.length ? `<div class="note-thumb">${n.images.map(src=>`<img src="${src}" />`).join('')}</div>` : ''}
      </div>
    `).join('');
  }

  // ── アクション ─────────────────────────────────────────────────────────
  function selectNote(id) {
    currentId = id;
    renderList();
    const note = notes.find(n => n.id === id);
    if (note) showView(note);
    closeSidebar();
  }

  function newNote() {
    currentId = null;
    pendingImages = [];
    document.getElementById('title-input').value = '';
    document.getElementById('body-input').value = '';
    document.getElementById('char-count').textContent = '';
    renderPreviews();
    renderList();
    showEdit();
    closeSidebar();
    document.getElementById('title-input').focus();
  }

  function submitNote() {
    const title = document.getElementById('title-input').value.trim();
    const body = document.getElementById('body-input').value.trim();
    if (!title && !body && pendingImages.length === 0) {
      setSync('err', 'タイトルか内容を入力してください'); return;
    }
    setSync('ing', '保存中...');
    document.getElementById('submit-btn').disabled = true;
    const id = currentId || notesRef.push().key;
    currentId = id;
    const images = pendingImages.map(i => i.dataUrl);
    notesRef.child(id).set({
      id, title, body,
      images: images.length ? images : null,
      lastEditor: username,
      dateStr: nowStr(),
      updated: Date.now()
    }).then(() => {
      setSync('ok', '登録しました！');
      document.getElementById('submit-btn').disabled = false;
      const note = notes.find(n => n.id === id);
      if (note) showView(note);
    }).catch(() => {
      setSync('err', '保存失敗');
      document.getElementById('submit-btn').disabled = false;
    });
  }

  function deleteNote() {
    if (!currentId) return;
    if (!confirm('このメモを削除しますか？')) return;
    notesRef.child(currentId).remove().then(() => {
      currentId = null;
      showEmpty();
      setSync('ok', '削除しました');
    });
  }

  function filterNotes(v) { query = v; renderList(); }

  // ── Firebase同期 ───────────────────────────────────────────────────────
  notesRef.on('value', snapshot => {
    const data = snapshot.val() || {};
    notes = Object.values(data).sort((a, b) => b.updated - a.updated);
    renderList();
    // 閲覧中のメモが更新されたら表示を更新
    if (currentId) {
      const updated = notes.find(n => n.id === currentId);
      if (updated && document.getElementById('view-mode').style.display !== 'none') {
        showView(updated);
      }
    }
    setSync('ok', 'リアルタイム同期中');
  });
</script>
</body>
</html>
