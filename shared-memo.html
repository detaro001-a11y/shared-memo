<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>共有メモ</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: rgba(0,0,0,0.08);
      --border-md: rgba(0,0,0,0.15);
      --text: #1c1b18;
      --text-2: #6b6a63;
      --text-3: #b0ae a5;
      --accent: #2a7c5f;
      --accent-light: #e8f5ef;
      --accent-mid: #4aa882;
      --danger: #b33a3a;
      --danger-light: #fdf0f0;
      --new-badge: #e8622a;
      --radius: 10px;
      --radius-lg: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-lg: 0 4px 24px rgba(0,0,0,0.11);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #17171a;
        --surface: #212124;
        --surface2: #2a2a2e;
        --border: rgba(255,255,255,0.07);
        --border-md: rgba(255,255,255,0.14);
        --text: #eeece6;
        --text-2: #9a9890;
        --text-3: #5a5955;
        --accent: #4aa882;
        --accent-light: #0d3325;
        --accent-mid: #6dc4a0;
        --danger-light: #3a1a1a;
        --shadow: 0 2px 12px rgba(0,0,0,0.25);
        --shadow-lg: 0 4px 24px rgba(0,0,0,0.35);
      }
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Zen Kaku Gothic New', 'Hiragino Sans', sans-serif; }
    body { display: flex; flex-direction: column; }

    /* ヘッダー */
    header {
      padding: 0 20px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    #menu-btn {
      background: none;
      border: 1px solid var(--border-md);
      border-radius: var(--radius);
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-2);
      display: none;
      font-family: inherit;
    }
    .user-row { display: flex; align-items: center; gap: 8px; }
    .user-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--accent-light);
      border: 1.5px solid var(--accent-mid);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--accent);
    }
    #username-input {
      border: 1px solid var(--border-md);
      border-radius: var(--radius);
      padding: 6px 12px;
      font-size: 13px;
      background: var(--surface2);
      color: var(--text);
      width: 120px;
      font-family: inherit;
    }
    #username-input:focus { outline: none; border-color: var(--accent); }

    #main { display: flex; flex: 1; overflow: hidden; }

    /* サイドバー */
    #sidebar {
      width: 260px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }
    #sidebar-top { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
    #search {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 13px;
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
    }
    #search:focus { outline: none; border-color: var(--accent); }
    #search::placeholder { color: var(--text-3); }
    #new-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
      transition: opacity 0.15s;
    }
    #new-btn:hover { opacity: 0.88; }

    #note-list { flex: 1; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 4px; }
    .note-item {
      padding: 11px 13px;
      cursor: pointer;
      border-radius: var(--radius);
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      position: relative;
    }
    .note-item:hover { background: var(--surface2); }
    .note-item.active { background: var(--accent-light); border-color: var(--accent-mid); }
    .note-item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
    .note-title-li { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .badge-new {
      background: var(--new-badge);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .note-preview { font-size: 11px; color: var(--text-2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-meta { font-size: 10px; color: var(--text-3); margin-top: 4px; display: flex; justify-content: space-between; }
    .note-thumb { display: flex; gap: 4px; margin-top: 5px; }
    .note-thumb img { width: 34px; height: 34px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }

    /* エディタ */
    #editor { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); overflow: hidden; }

    /* 空状態 */
    #empty-editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-3);
    }
    .empty-icon { font-size: 36px; opacity: 0.4; }
    .empty-text { font-size: 13px; }

    /* 閲覧モード */
    #view-mode { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #view-top {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      background: var(--surface);
    }
    #view-title { font-size: 20px; font-weight: 700; color: var(--text); flex: 1; line-height: 1.4; }
    .view-actions { display: flex; gap: 8px; flex-shrink: 0; }
    #edit-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    #edit-btn:hover { opacity: 0.88; }
    #view-delete-btn {
      background: none;
      border: 1px solid var(--border-md);
      border-radius: var(--radius);
      padding: 7px 12px;
      font-size: 12px;
      color: var(--text-2);
      cursor: pointer;
      font-family: inherit;
    }
    #view-delete-btn:hover { color: var(--danger); border-color: var(--danger); background: var(--danger-light); }
    #view-body-wrap { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    #view-body { font-size: 15px; line-height: 2; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    #view-images { display: flex; flex-wrap: wrap; gap: 10px; }
    #view-images img { width: 120px; height: 120px; object-fit: cover; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s; box-shadow: var(--shadow); }
    #view-images img:hover { transform: scale(1.04); }
    #view-footer {
      padding: 8px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-3);
      display: flex;
      justify-content: space-between;
      background: var(--surface);
    }

    /* 編集モード */
    #edit-mode { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    #edit-top {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }
    #title-input {
      border: none;
      outline: none;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      background: transparent;
      flex: 1;
      min-width: 0;
      font-family: inherit;
    }
    #title-input::placeholder { color: var(--text-3); font-weight: 400; }
    #cancel-btn {
      background: none;
      border: 1px solid var(--border-md);
      border-radius: var(--radius);
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-2);
      cursor: pointer;
      font-family: inherit;
    }
    #cancel-btn:hover { background: var(--surface2); }
    #body-wrap { flex: 1; display: flex; flex-direction: column; padding: 16px 20px; gap: 12px; overflow-y: auto; }
    #body-input {
      flex: 1;
      border: 1px solid var(--border-md);
      border-radius: var(--radius-lg);
      padding: 16px;
      font-size: 15px;
      line-height: 1.9;
      color: var(--text);
      background: var(--surface);
      font-family: inherit;
      resize: none;
      min-height: 140px;
      box-shadow: var(--shadow);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #body-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    #body-input::placeholder { color: var(--text-3); }

    #image-label {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      border: 1.5px dashed var(--border-md);
      border-radius: var(--radius);
      padding: 13px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-2);
      transition: border-color 0.15s, color 0.15s;
      background: var(--surface);
    }
    #image-label:hover { border-color: var(--accent); color: var(--accent); }
    #image-input { display: none; }
    #image-previews { display: flex; flex-wrap: wrap; gap: 10px; }
    .preview-wrap { position: relative; width: 86px; height: 86px; }
    .preview-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; box-shadow: var(--shadow); }
    .preview-wrap button { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; border-radius: 50%; background: var(--danger); color: #fff; border: none; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }
    #size-warn { font-size: 11px; color: var(--danger); }

    #submit-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
      letter-spacing: 0.03em;
      transition: opacity 0.15s;
      box-shadow: var(--shadow);
    }
    #submit-btn:hover { opacity: 0.88; }
    #submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #status-bar {
      padding: 7px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-3);
      display: flex;
      justify-content: space-between;
      background: var(--surface);
    }
    .sync-ok { color: var(--accent); }
    .sync-ing { color: #c07a20; }
    .sync-err { color: var(--danger); }

    .empty-list { padding: 16px; font-size: 12px; color: var(--text-3); text-align: center; }

    /* モーダル */
    #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
    #modal.show { display: flex; }
    #modal img { max-width: 92vw; max-height: 92vh; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); }
    #modal-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 18px; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }

    @media (max-width: 600px) {
      #menu-btn { display: block; }
      #sidebar { position: fixed; top: 56px; left: 0; bottom: 0; z-index: 20; width: 82vw; max-width: 300px; transform: translateX(-100%); box-shadow: var(--shadow-lg); }
      #sidebar.open { transform: translateX(0); }
      #overlay { display: none; position: fixed; inset: 56px 0 0 0; background: rgba(0,0,0,0.35); z-index: 15; }
      #overlay.show { display: block; }
      #username-input { width: 90px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <button id="menu-btn" onclick="toggleSidebar()">☰ 一覧</button>
    <div class="logo"><div class="logo-dot"></div>共有メモ</div>
  </div>
  <div class="user-row">
    <div class="user-avatar" id="user-avatar">?</div>
    <input id="username-input" type="text" placeholder="名前を入力..." maxlength="12" />
  </div>
</header>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-top">
      <input id="search" type="text" placeholder="🔍 メモを検索..." oninput="filterNotes(this.value)" />
      <button id="new-btn" onclick="newNote()">＋ 新しいメモ</button>
    </div>
    <div id="note-list"><div class="empty-list">接続中...</div></div>
  </div>

  <div id="editor">
    <div id="empty-editor">
      <div class="empty-icon">📋</div>
      <div class="empty-text">メモを選択するか、新規作成してください</div>
    </div>

    <div id="view-mode" style="display:none;">
      <div id="view-top">
        <div id="view-title"></div>
        <div class="view-actions">
          <button id="edit-btn" onclick="enterEditMode()">編集</button>
          <button id="view-delete-btn" onclick="deleteNote()">削除</button>
        </div>
      </div>
      <div id="view-body-wrap">
        <div id="view-body"></div>
        <div id="view-images"></div>
      </div>
      <div id="view-footer">
        <span id="view-editor"></span>
        <span id="view-date"></span>
      </div>
    </div>

    <div id="edit-mode" style="display:none;">
      <div id="edit-top">
        <input id="title-input" type="text" placeholder="タイトル" />
        <button id="cancel-btn" onclick="cancelEdit()">キャンセル</button>
      </div>
      <div id="body-wrap">
        <textarea id="body-input" placeholder="ここにメモを書いてください..."></textarea>
        <div>
          <label id="image-label" for="image-input">📷 画像を追加（カメラ・アルバム、最大3枚）</label>
          <input id="image-input" type="file" accept="image/*" multiple onchange="handleImages(this)" />
          <div id="image-previews"></div>
          <div id="size-warn"></div>
        </div>
        <button id="submit-btn" onclick="submitNote()">登録する</button>
      </div>
      <div id="status-bar">
        <span id="char-count"></span>
        <span id="sync-indicator" class="sync-ok"></span>
      </div>
    </div>
  </div>
</div>

<div id="modal" onclick="closeModal()">
  <button id="modal-close" onclick="closeModal()">✕</button>
  <img id="modal-img" src="" alt="" />
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    databaseURL: "https://shared-memo-65d9d-default-rtdb.asia-southeast1.firebasedatabase.app"
  });
  const db = firebase.database();
  const notesRef = db.ref('notes');

  let notes = [], currentId = null, username = 'ゲスト', query = '';
  let pendingImages = [];
  const MAX_IMAGES = 3, MAX_SIZE = 800;

  // 既読管理（localStorageで端末ごとに保持）
  function getReadSet() {
    try { return new Set(JSON.parse(localStorage.getItem('read-notes') || '[]')); } catch { return new Set(); }
  }
  function markRead(id) {
    const s = getReadSet(); s.add(id);
    localStorage.setItem('read-notes', JSON.stringify([...s]));
  }
  function isRead(id) { return getReadSet().has(id); }

  // アバター文字
  document.getElementById('username-input').addEventListener('input', e => {
    username = e.target.value.trim() || 'ゲスト';
    document.getElementById('user-avatar').textContent = username.charAt(0) || '?';
  });
  document.getElementById('body-input').addEventListener('input', e => {
    document.getElementById('char-count').textContent = e.target.value.length + ' 文字';
  });

  // ── モード切替 ─────────────────────────────────────────────────────────
  function showEmpty() {
    document.getElementById('empty-editor').style.display = 'flex';
    document.getElementById('view-mode').style.display = 'none';
    document.getElementById('edit-mode').style.display = 'none';
  }
  function showView(note) {
    document.getElementById('empty-editor').style.display = 'none';
    document.getElementById('view-mode').style.display = 'flex';
    document.getElementById('edit-mode').style.display = 'none';
    document.getElementById('view-title').textContent = note.title || '無題';
    document.getElementById('view-body').textContent = note.body || '';
    document.getElementById('view-editor').textContent = '編集者: ' + (note.lastEditor || '不明');
    document.getElementById('view-date').textContent = note.dateStr || '';
    const imgWrap = document.getElementById('view-images');
    imgWrap.innerHTML = note.images ? note.images.map(src => `<img src="${src}" onclick="openModal('${src}')" />`).join('') : '';
    markRead(note.id);
    renderList();
  }
  function showEdit() {
    document.getElementById('empty-editor').style.display = 'none';
    document.getElementById('view-mode').style.display = 'none';
    document.getElementById('edit-mode').style.display = 'flex';
  }

  function enterEditMode() {
    const note = notes.find(n => n.id === currentId);
    if (!note) return;
    document.getElementById('title-input').value = note.title || '';
    document.getElementById('body-input').value = note.body || '';
    document.getElementById('char-count').textContent = (note.body || '').length + ' 文字';
    pendingImages = note.images ? note.images.map(d => ({ dataUrl: d })) : [];
    renderPreviews();
    showEdit();
    document.getElementById('body-input').focus();
  }

  function cancelEdit() {
    if (currentId) {
      const note = notes.find(n => n.id === currentId);
      if (note) { showView(note); return; }
    }
    showEmpty(); currentId = null; renderList();
  }

  // ── サイドバー ─────────────────────────────────────────────────────────
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  // ── 画像処理 ──────────────────────────────────────────────────────────
  function handleImages(input) {
    const files = Array.from(input.files);
    const remaining = MAX_IMAGES - pendingImages.length;
    if (remaining <= 0) { document.getElementById('size-warn').textContent = '画像は最大3枚です'; return; }
    files.slice(0, remaining).forEach(file => {
      resizeImage(file, MAX_SIZE).then(dataUrl => {
        pendingImages.push({ dataUrl });
        renderPreviews();
      });
    });
    input.value = '';
  }
  function resizeImage(file, maxPx) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = url;
    });
  }
  function renderPreviews() {
    document.getElementById('image-previews').innerHTML = pendingImages.map((img, i) => `
      <div class="preview-wrap">
        <img src="${img.dataUrl}" onclick="openModal('${img.dataUrl}')" />
        <button onclick="removeImage(${i})">✕</button>
      </div>
    `).join('');
    document.getElementById('size-warn').textContent = pendingImages.length >= MAX_IMAGES ? '画像は最大3枚です' : '';
  }
  function removeImage(i) { pendingImages.splice(i, 1); renderPreviews(); }

  // ── モーダル ──────────────────────────────────────────────────────────
  function openModal(src) {
    document.getElementById('modal-img').src = src;
    document.getElementById('modal').classList.add('show');
  }
  function closeModal() { document.getElementById('modal').classList.remove('show'); }

  // ── ユーティリティ ─────────────────────────────────────────────────────
  function nowStr() {
    return new Date().toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function setSync(state, text) {
    const el = document.getElementById('sync-indicator');
    el.className = 'sync-' + state;
    el.textContent = text;
  }

  // ── レンダリング ───────────────────────────────────────────────────────
  function renderList() {
    const list = document.getElementById('note-list');
    const filtered = notes.filter(n => (n.title||'').includes(query) || (n.body||'').includes(query));
    if (filtered.length === 0) { list.innerHTML = '<div class="empty-list">メモがありません</div>'; return; }
    list.innerHTML = filtered.map(n => {
      const unread = !isRead(n.id) && n.lastEditor !== username;
      return `
        <div class="note-item ${n.id === currentId ? 'active' : ''}" onclick="selectNote('${n.id}')">
          <div class="note-item-header">
            <div class="note-title-li">${escHtml(n.title)||'無題'}</div>
            ${unread ? '<span class="badge-new">NEW</span>' : ''}
          </div>
          <div class="note-preview">${escHtml((n.body||'').replace(/\n/g,' '))}</div>
          <div class="note-meta"><span>${escHtml(n.lastEditor)||''}</span><span>${n.dateStr||''}</span></div>
          ${n.images && n.images.length ? `<div class="note-thumb">${n.images.map(src=>`<img src="${src}" />`).join('')}</div>` : ''}
        </div>
      `;
    }).join('');
  }

  // ── アクション ─────────────────────────────────────────────────────────
  function selectNote(id) {
    currentId = id;
    const note = notes.find(n => n.id === id);
    if (note) showView(note);
    closeSidebar();
  }

  function newNote() {
    currentId = null;
    pendingImages = [];
    document.getElementById('title-input').value = '';
    document.getElementById('body-input').value = '';
    document.getElementById('char-count').textContent = '';
    renderPreviews();
    renderList();
    showEdit();
    closeSidebar();
    document.getElementById('title-input').focus();
  }

  function submitNote() {
    const title = document.getElementById('title-input').value.trim();
    const body = document.getElementById('body-input').value.trim();
    if (!title && !body && pendingImages.length === 0) {
      setSync('err', 'タイトルか内容を入力してください'); return;
    }
    setSync('ing', '保存中...');
    document.getElementById('submit-btn').disabled = true;
    const id = currentId || notesRef.push().key;
    currentId = id;
    const images = pendingImages.map(i => i.dataUrl);
    notesRef.child(id).set({
      id, title, body,
      images: images.length ? images : null,
      lastEditor: username,
      dateStr: nowStr(),
      updated: Date.now()
    }).then(() => {
      setSync('ok', '登録しました！');
      document.getElementById('submit-btn').disabled = false;
      markRead(id);
      const note = notes.find(n => n.id === id);
      if (note) showView(note);
    }).catch(() => {
      setSync('err', '保存失敗');
      document.getElementById('submit-btn').disabled = false;
    });
  }

  function deleteNote() {
    if (!currentId) return;
    if (!confirm('このメモを削除しますか？')) return;
    notesRef.child(currentId).remove().then(() => {
      currentId = null;
      showEmpty();
      setSync('ok', '削除しました');
    });
  }

  function filterNotes(v) { query = v; renderList(); }

  // ── Firebase同期 ───────────────────────────────────────────────────────
  notesRef.on('value', snapshot => {
    const data = snapshot.val() || {};
    notes = Object.values(data).sort((a, b) => b.updated - a.updated);
    renderList();
    if (currentId && document.getElementById('view-mode').style.display !== 'none') {
      const updated = notes.find(n => n.id === currentId);
      if (updated) showView(updated);
    }
    setSync('ok', 'リアルタイム同期中');
  });
</script>
</body>
</html>
